# Cloudflare Workers 配置 —— tcg-card 后端 API
# 真实 database_id / KV id 在创建对应资源后填入（TBD，见 dev-plan §12 / README §TBD总清单）。
name = "kando-workers-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "kando-db"
database_id = "00000000-0000-0000-0000-000000000000" # TBD：wrangler d1 create 后替换
migrations_dir = "src/db/migrations"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "0000000000000000000000000000000000" # TBD：wrangler kv namespace create 后替换
