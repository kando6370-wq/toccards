# Cloudflare Workers 配置 —— tcg-card 后端 API
# 真实 database_id / KV id 在创建对应资源后填入（TBD，见 dev-plan §12 / README §TBD总清单）。
name = "toccards"
main = "src/index.ts"
compatibility_date = "2024-11-01"
routes = [{ pattern = "api.tcgcard.fun", custom_domain = true }]

[vars]
GOOGLE_CLIENT_ID = "134647928937-abbkvdc4ntfsui9utm828bc1vhgabdmo.apps.googleusercontent.com"
APPLE_CLIENT_ID = "com.kando.kandoApp"
ZOHO_ACCOUNT_ID = "554851100000008002"
ZOHO_FROM_ADDRESS = "kando@tcgcard.fun"
OCR_SERVICE_BASE_URL = "https://recognize.tcgcard.fun"
SCAN_IMAGE_RETENTION_DAYS = "30"

[triggers]
crons = ["17 3 * * *"]

[assets]
directory = "../admin-web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "cards_basic_information"
database_id = "6096d92e-571b-4668-9e83-543f64300de4" # Cloudflare D1: cards_basic_information
migrations_dir = "src/db/migrations"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "c90e2c87b2c042ea93c58d38095973c7" # Cloudflare KV: CACHE_KV

[[r2_buckets]]
binding = "SCAN_IMAGES"
bucket_name = "toccards-scan-images"
