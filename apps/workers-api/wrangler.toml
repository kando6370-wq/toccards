# Cloudflare Workers 配置 —— tcg-card 后端 API
# 真实 database_id / KV id 在创建对应资源后填入（TBD，见 dev-plan §12 / README §TBD总清单）。
name = "kando-workers-api"
main = "src/index.ts"
compatibility_date = "2024-11-01"

[assets]
directory = "../admin-web/dist"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

[[d1_databases]]
binding = "DB"
database_name = "kando-db"
database_id = "a89512d0-661d-43d0-8742-1b8cfc41efbd" # Cloudflare D1: kando-db
migrations_dir = "src/db/migrations"

[[kv_namespaces]]
binding = "CACHE_KV"
id = "35846076e5a74d279bf75e3c6b7d18d4" # Cloudflare KV: CACHE_KV
