name: iOS build

on:
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/ios-build.yml"
      - "apps/flutter-app/**"
      - "pubspec.yaml"
      - "pubspec.lock"
  pull_request:
    paths:
      - ".github/workflows/ios-build.yml"
      - "apps/flutter-app/**"
      - "pubspec.yaml"
      - "pubspec.lock"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.35.5"
          cache: true

      - name: Record Apple toolchain
        run: |
          xcodebuild -version
          pod --version

      - name: Resolve Flutter workspace dependencies
        run: flutter pub get

      - name: Install iOS pods
        working-directory: apps/flutter-app/ios
        run: |
          pod install 2>&1 | tee "$RUNNER_TEMP/pod-install.log"
          if grep -Fq "CocoaPods did not set the base configuration" "$RUNNER_TEMP/pod-install.log"; then
            exit 1
          fi
          git diff --exit-code -- Podfile.lock

      - name: Upload CocoaPods lockfile
        uses: actions/upload-artifact@v4
        with:
          name: ios-podfile-lock-${{ github.sha }}
          path: apps/flutter-app/ios/Podfile.lock
          if-no-files-found: error
          retention-days: 7

      - name: Build unsigned iOS release
        working-directory: apps/flutter-app
        run: flutter build ios --release --no-codesign --no-pub
